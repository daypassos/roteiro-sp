<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roteiro SP – 03 a 07/06</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f8f9fa;
    --border: #e5e7eb;
    --border2: #d1d5db;
    --text: #111827;
    --text2: #6b7280;
    --text3: #9ca3af;
    --accent: #185FA5;
    --accent-bg: #E6F1FB;
    --radius: 12px;
    --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --bg2: #1e293b;
      --border: #334155;
      --border2: #475569;
      --text: #f1f5f9;
      --text2: #94a3b8;
      --text3: #64748b;
      --accent: #60a5fa;
      --accent-bg: #1e3a5f;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .app-header { background: var(--accent); color: #fff; padding: 1rem 1.25rem; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .app-header-inner { max-width: 680px; margin: 0 auto; display: flex; align-items: center; gap: 10px; }
  .app-header i { font-size: 24px; }
  .app-header-title { font-size: 17px; font-weight: 600; }
  .app-header-sub { font-size: 12px; opacity: 0.8; }

  /* MAIN */
  .main { max-width: 680px; margin: 0 auto; padding: 1rem 1rem 4rem; }

  /* TABS */
  .day-tabs { display: grid; grid-template-columns: repeat(5,1fr); gap: 4px; margin-bottom: 1.25rem; }
  .day-tab { padding: 8px 4px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--bg); cursor: pointer; text-align: center; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
  .day-tab.active { border-color: var(--accent); background: var(--accent-bg); }
  .day-tab-date { font-size: 10.5px; font-weight: 600; color: var(--text); }
  .day-tab.active .day-tab-date { color: var(--accent); }
  .day-tab-label { font-size: 9px; color: var(--text2); margin-top: 2px; line-height: 1.3; }

  /* DAY HEADER CARD */
  .day-card { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; padding: 1rem 1.25rem; background: var(--bg2); border-radius: var(--radius); border: 0.5px solid var(--border); }
  .day-card-icon { width: 42px; height: 42px; border-radius: 50%; background: var(--accent-bg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .day-card-icon i { font-size: 20px; color: var(--accent); }
  .day-card-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .day-card-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* PROGRESS */
  .prog-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .prog-bar { height: 5px; background: var(--border); border-radius: 3px; margin-bottom: 1.25rem; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; }

  /* TIMELINE */
  .timeline { display: flex; flex-direction: column; gap: 6px; }
  .stop { display: flex; gap: 12px; }
  .stop-line { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
  .stop-dot { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--border2); background: var(--bg); display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .stop-dot i { font-size: 15px; color: var(--text2); }
  .stop-dot.active-dot { border-color: var(--accent); background: var(--accent-bg); }
  .stop-dot.active-dot i { color: var(--accent); }
  .stop-connector { width: 2px; flex: 1; min-height: 8px; background: var(--border); margin: 3px 0; }
  .done-stamp { width: 34px; height: 34px; border-radius: 50%; background: #dcfce7; border: 2px solid #16a34a; display: flex; align-items: center; justify-content: center; }
  .done-stamp i { font-size: 16px; color: #15803d; }
  .stop-body { flex: 1; padding-bottom: 10px; }
  .stop-time { font-size: 11px; color: var(--text3); font-weight: 500; letter-spacing: 0.04em; margin-bottom: 3px; }

  /* CARDS */
  .stop-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 11px 14px; transition: border-color 0.2s; }
  .stop-card.done-card { background: var(--bg2); }
  .stop-card.now-card { border-color: var(--accent); border-width: 1.5px; }
  .stop-header { display: flex; align-items: flex-start; gap: 8px; }
  .stop-name { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; line-height: 1.35; }
  .stop-badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; flex-shrink: 0; white-space: nowrap; margin-top: 2px; }
  .badge-metro { background: #dbeafe; color: #1e40af; }
  .badge-bus   { background: #d1fae5; color: #065f46; }
  .badge-walk  { background: #dcfce7; color: #166534; }
  .badge-visit { background: #ede9fe; color: #4c1d95; }
  .badge-food  { background: #fee2e2; color: #991b1b; }
  .badge-fest  { background: #fef3c7; color: #92400e; }
  .badge-shop  { background: #fce7f3; color: #831843; }
  .badge-beach { background: #e0f2fe; color: #075985; }
  .badge-church{ background: #fef9c3; color: #713f12; }
  .stop-desc { font-size: 12px; color: var(--text2); margin-top: 6px; line-height: 1.55; }

  /* NOW PILL */
  .now-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 600; color: var(--accent); background: var(--accent-bg); padding: 3px 10px; border-radius: 20px; margin-bottom: 4px; }
  .now-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* TRANSIT */
  .transit-row { display: flex; align-items: center; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .line-pill { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .l1   { background: #2B5FA5; color: #fff; }
  .l2   { background: #12943F; color: #fff; }
  .l3   { background: #D42128; color: #fff; }
  .l4   { background: #F5C200; color: #333; }
  .l5   { background: #9B3DA1; color: #fff; }
  .lbus { background: #065f46; color: #fff; }
  .transit-arrow { font-size: 11px; color: var(--text3); }

  /* CHECKLIST */
  .checklist { margin-top: 10px; display: flex; flex-direction: column; gap: 2px; border-top: 0.5px solid var(--border); padding-top: 8px; }
  .check-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; cursor: pointer; border-radius: 6px; -webkit-tap-highlight-color: transparent; }
  .check-item input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; flex-shrink: 0; accent-color: var(--accent); }
  .check-label { font-size: 12.5px; color: var(--text2); user-select: none; }
  .check-item.checked .check-label { text-decoration: line-through; color: var(--text3); }

  /* ACTIONS */
  .stop-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; padding: 6px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border2); color: var(--text2); background: var(--bg); cursor: pointer; text-decoration: none; transition: background 0.15s; font-family: inherit; }
  .btn:hover, .btn:active { background: var(--bg2); }
  .btn i { font-size: 14px; }
  .btn-done { border-color: #16a34a; color: #15803d; }
  .btn-done:hover { background: #f0fdf4; }
  .btn-undo { border-color: var(--border2); }

  /* FOOTER */
  footer { text-align: center; padding: 2rem 1rem; font-size: 11px; color: var(--text3); }
</style>
</head>

    {id:"07-9",time:"18:00",name:"Retorno ao Hotel – Fim da viagem!",type:"walk",desc:"Caminhada curta de ~5 min do Mosteiro até o Hotel Euro Suite.",icon:"ti-home-2",checks:["Chegada segura","Check-out organizado para o dia seguinte"],mapQuery:"Hotel+Euro+Suite+São+Paulo",transit:[]}

const DAY_KEYS = ["03","04","05","06","07"];
const STORAGE_KEY = "roteiro_sp_jun_state";

// Load/save state
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}
function saveState() {
  try {
    const serial = {};
    DAY_KEYS.forEach(d => {
      serial[d] = {
        done: [...state.done[d]],
        checks: {}
      };
      Object.entries(state.checks[d]).forEach(([sid, set]) => {
        serial[d].checks[sid] = [...set];
      });
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(serial));
  } catch(e) {}
}

const state = { done: {}, checks: {} };
DAY_KEYS.forEach(d => {
  state.done[d] = new Set();
  state.checks[d] = {};
  DAYS[d].stops.forEach(s => { state.checks[d][s.id] = new Set(); });
});

// Restore from localStorage
const saved = loadState();
if (saved) {
  DAY_KEYS.forEach(d => {
    if (saved[d]) {
      if (saved[d].done) saved[d].done.forEach(id => state.done[d].add(id));
      if (saved[d].checks) {
        Object.entries(saved[d].checks).forEach(([sid, arr]) => {
          if (state.checks[d][sid]) arr.forEach(ci => state.checks[d][sid].add(ci));
        });
      }
    }
  });
}

// Auto-select today's tab
function getTodayKey() {
  const now = new Date();
  const d = now.getDate();
  const m = now.getMonth() + 1;
  if (m === 6 && d >= 3 && d <= 7) return String(d).padStart(2,"0");
  return "03";
}

let activeDay = getTodayKey();

// Build tabs
const tabsEl = document.getElementById("tabs");
DAY_KEYS.forEach(d => {
  const labels = {"03":"Ipiranga · Liberdade","04":"Butantan · MAC","05":"Compras · Brás","06":"Santos · Pelé","07":"Paulista · Sé"};
  const dates  = {"03":"03/06 Qua","04":"04/06 Qui","05":"05/06 Sex","06":"06/06 Sáb","07":"07/06 Dom"};
  const div = document.createElement("div");
  div.className = "day-tab" + (d === activeDay ? " active" : "");
  div.id = "tab-" + d;
  div.innerHTML = `<div class="day-tab-date">${dates[d]}</div><div class="day-tab-label">${labels[d]}</div>`;
  div.addEventListener("click", () => switchDay(d));
  tabsEl.appendChild(div);
});

function switchDay(d) {
  activeDay = d;
  DAY_KEYS.forEach(x => {
    document.getElementById("tab-"+x).className = "day-tab" + (x===d?" active":"");
  });
  render();
  window.scrollTo({top:0, behavior:"smooth"});
}

function getNowStop(stops) {
  const now = new Date(), mins = now.getHours()*60+now.getMinutes();
  let cur = 0;
  for (let i = 0; i < stops.length-1; i++) {
    const [h,m] = stops[i].time.split(":").map(Number);
    const [h2,m2] = stops[i+1].time.split(":").map(Number);
    if (mins >= h*60+m && mins < h2*60+m2) { cur=i; break; }
    if (mins >= h2*60+m2) cur = i+1;
  }
  return cur;
}

function updateProgress(day) {
  const stops = DAYS[day].stops;
  const doneCount = state.done[day].size;
  const checkCount = Object.values(state.checks[day]).reduce((s,set)=>s+set.size,0);
  const totalChecks = stops.reduce((s,st)=>s+st.checks.length,0);
  const pct = totalChecks + stops.length === 0 ? 0 : Math.round((doneCount+checkCount)/(stops.length+totalChecks)*100);
  document.getElementById("prog-fill").style.width = pct+"%";
  document.getElementById("prog-pct").textContent = pct+"%";
  document.getElementById("prog-label").textContent = doneCount+" de "+stops.length+" paradas concluídas";
}

function render() {
  const day = activeDay, { title, sub, stops } = DAYS[day];
  const nowIdx = getNowStop(stops);

  const badgeMap   = {metro:"badge-metro",bus:"badge-bus",walk:"badge-walk",visit:"badge-visit",food:"badge-food",fest:"badge-fest",shop:"badge-shop",beach:"badge-beach",church:"badge-church"};
  const badgeLabel = {metro:"Metrô",bus:"Ônibus",walk:"Caminhada",visit:"Visita",food:"Alimentação",fest:"Festa",shop:"Compras",beach:"Orla",church:"Igreja"};
  const lineNames  = {l1:"Linha 1",l2:"Linha 2",l3:"Linha 3",l4:"Linha 4",l5:"Linha 5",lbus:"Ônibus"};

  document.getElementById("day-header").innerHTML = `
    <div class="day-card">
      <div class="day-card-icon"><i class="ti ti-map-2"></i></div>
      <div>
        <div class="day-card-title">${title}</div>
        <div class="day-card-sub">${sub}</div>
        
      </div>
    </div>`;

  const tl = document.getElementById("timeline");
  tl.innerHTML = "";

  stops.forEach((stop, i) => {
    const isDone = state.done[day].has(stop.id);
    const isNow  = i === nowIdx && !isDone;
    const isLast = i === stops.length-1;

    const dotEl = isDone
      ? `<div class="done-stamp"><i class="ti ti-check"></i></div>`
      : `<div class="stop-dot ${isNow?'active-dot':''}"><i class="ti ${stop.icon}"></i></div>`;

    const nowPill = isNow
      ? `<div class="now-pill"><div class="now-dot"></div> Agora</div>` : "";

    const checksHtml = stop.checks.length ? `
      <div class="checklist">
        ${stop.checks.map((c,ci) => {
          const checked = state.checks[day][stop.id].has(ci);
          return `<label class="check-item ${checked?'checked':''}">
            <input type="checkbox" data-day="${day}" data-stop="${stop.id}" data-ci="${ci}" ${checked?'checked':''}/>
            <span class="check-label">${c}</span>
          </label>`;
        }).join("")}
      </div>` : "";

    const transitHtml = stop.transit.length ? `
      <div class="transit-row">
        ${stop.transit.map((l,idx) =>
          (idx > 0 ? `<span class="transit-arrow">→</span>` : "") +
          `<span class="line-pill ${l}">${lineNames[l]}</span>`
        ).join("")}
      </div>` : "";

    const mapHref = `https://www.google.com/maps/search/${stop.mapQuery}`;

    const el = document.createElement("div");
    el.className = "stop";
    el.innerHTML = `
      <div class="stop-line">
        ${dotEl}
        ${!isLast ? '<div class="stop-connector"></div>' : ''}
      </div>
      <div class="stop-body">
        ${nowPill}
        <div class="stop-time">${stop.time}</div>
        <div class="stop-card ${isDone?'done-card':''} ${isNow?'now-card':''}">
          <div class="stop-header">
            <div class="stop-name">${stop.name}</div>
            <span class="stop-badge ${badgeMap[stop.type]}">${badgeLabel[stop.type]}</span>
          </div>
          <div class="stop-desc">${stop.desc}</div>
          ${transitHtml}
          ${checksHtml}
          <div class="stop-actions">
            <a class="btn" href="${mapHref}" target="_blank" rel="noopener">
              <i class="ti ti-map-pin"></i> Ver no mapa
            </a>
            <button class="btn ${isDone?'btn-undo':'btn-done'}" data-day="${day}" data-id="${stop.id}">
              <i class="ti ${isDone?'ti-rotate-clockwise':'ti-circle-check'}"></i>
              ${isDone ? 'Desfazer' : 'Concluído'}
            </button>
            
          </div>
        </div>
      </div>`;
    tl.appendChild(el);
  });

  // Bind checkboxes
  tl.querySelectorAll("input[type=checkbox]").forEach(cb => {
    cb.addEventListener("change", function() {
      const d = this.dataset.day, sid = this.dataset.stop, ci = parseInt(this.dataset.ci);
      if (this.checked) state.checks[d][sid].add(ci);
      else state.checks[d][sid].delete(ci);
      saveState(); render(); updateProgress(d);
    });
  });

  // Bind done buttons
  tl.querySelectorAll("button[data-id]").forEach(btn => {
    btn.addEventListener("click", function() {
      const d = this.dataset.day, id = this.dataset.id;
      if (state.done[d].has(id)) state.done[d].delete(id);
      else state.done[d].add(id);
      saveState(); render();
    });
  });

  updateProgress(day);
}

render();
setInterval(render, 60000);
</script>
</body>
